name = "sheeper-preview-session"
main = "src/index.mjs"
compatibility_date = "2026-03-29"

[[durable_objects.bindings]]
name = "PREVIEW_SESSIONS"
class_name = "PreviewSessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PreviewSessionDO"]

[[r2_buckets]]
binding = "PREVIEW_ASSETS"
bucket_name = "sheeper-preview-assets"
preview_bucket_name = "sheeper-preview-assets"

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1
